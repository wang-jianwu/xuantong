config:
  maxSessions: 1000
  broker:
    # Broker 鉴权密钥（不配置则不校验，开发环境可不配）
    secretKey: ${BROKER_SECRET_KEY:}
  center:
    cluster:
      # 集群节点地址（复用 HTTP 端口，Broker 端点路径为 /config）
      nodes:
        #- sd:ws://127.0.0.1:8088/config
# 数据源配置
xuantong:
  class: "com.zaxxer.hikari.HikariDataSource"
  jdbcUrl: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/nimbus_config?useCursorFetch=true&rewriteBatchedStatements=true&useSSL=false&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
  driverClassName: com.mysql.cj.jdbc.Driver
  username: ${DB_USER:root}
  password: ${DB_PASSWORD:}
  #缓存
cache:
  base:
    driverType: "redis"
    defSeconds: 3600  # 延长缓存时间到1小时
    maxWaitMillis: 5000
    server: "${REDIS_HOST:127.0.0.1}:${REDIS_PORT:6379}"
    db: 0
    password: "${REDIS_PASSWORD:}"
    maxTotal: 10
    maxIdle: 20
    minIdle: 5
    testOnBorrow: true
easy-query:
  # 配置自定义日志
  # log-class: ...
  xuantong:
    # 支持mysql pgsql h2 mssql dameng mssql_row_number kingbase_es等其余数据库在适配中
    database: mysql
    # 支持underlined default lower_camel_case upper_camel_case upper_underlined
    name-conversion: underlined
    # 物理删除时抛出异常 不包括手写sql的情况
    delete-throw: true
    insert-strategy: only_not_null_columns
    # 更新列策略 all_columns only_not_null_columns only_null_columns
    update-strategy: only_not_null_columns

# 记录器级别的配置示例
solon.logging.logger:
  "root": #默认记录器配置
    level: INFO
  "com.zaxxer.hikari":
    level: WARN
  "com.easy.query":
    level: WARN
  "org.noear.solon":
    level: INFO
  "com.xuantong":
    level: DEBUG