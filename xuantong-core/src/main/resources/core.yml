config:
  maxSessions: 1000
  broker:
    # Broker 鉴权密钥（不配置则不校验，开发环境可不配）
    secretKey: ${BROKER_SECRET_KEY:}
  # 配置值加密密钥（不配置则不加密）
  encryptKey: ${CONFIG_ENCRYPT_KEY:}
  center:
    cluster:
      # 集群节点地址（复用 HTTP 端口，Broker 端点路径为 /config）
      nodes:
        #- sd:ws://127.0.0.1:8088/config
# ── 数据源 ──
# 默认 H2 内嵌数据库，零配置启动；生产环境通过 DB_* 环境变量切换数据库。
xuantong:
  class: "com.zaxxer.hikari.HikariDataSource"
  jdbcUrl: ${DB_URL:jdbc:h2:file:./data/xuantong;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_UPPER=FALSE}
  driverClassName: ${DB_DRIVER:org.h2.Driver}
  username: ${DB_USER:sa}
  password: ${DB_PASSWORD:}

#   #── 缓存（可选，默认本地内存缓存）──
#   #如需启用 Redis 共享缓存（多机部署），取消下方注释并配置连接信息

#cache:
#  base:
#    driverType: "redis"
#    server: "${REDIS_HOST:127.0.0.1}:${REDIS_PORT:6379}"
#    db: 0
#    password: "${REDIS_PASSWORD:}"
#    maxTotal: 10

easy-query:
  xuantong:
    # 数据库方言：h2（默认） / mysql / pgsql / mssql / dameng / kingbase_es
    database: ${DB_DIALECT:h2}
    name-conversion: underlined
    # 物理删除时抛出异常 不包括手写sql的情况
    delete-throw: true
    insert-strategy: only_not_null_columns
    # 更新列策略 all_columns only_not_null_columns only_null_columns
    update-strategy: only_not_null_columns

# 记录器级别的配置示例
solon.logging.logger:
  "root": #默认记录器配置
    level: INFO
  "com.zaxxer.hikari":
    level: WARN
  "com.easy.query":
    level: WARN
  "org.noear.solon":
    level: INFO
  "com.xuantong":
    level: INFO
