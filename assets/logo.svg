<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- 轻量级云朵轮廓 -->
  <path d="M30,60 Q45,30 60,30 Q75,30 90,60 Q105,60 105,75 Q105,90 90,90 H30 Q15,90 15,75 Q15,60 30,60 Z"
        fill="none" stroke="url(#gradient)" stroke-width="2"/>

  <!-- 配置齿轮元素 -->
  <circle cx="60" cy="60" r="12" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <line x1="60" y1="48" x2="60" y2="52" stroke="#10B981" stroke-width="1.5"/>
  <line x1="72" y1="60" x2="68" y2="60" stroke="#10B981" stroke-width="1.5"/>
  <line x1="60" y1="72" x2="60" y2="68" stroke="#10B981" stroke-width="1.5"/>
  <line x1="48" y1="60" x2="52" y2="60" stroke="#10B981" stroke-width="1.5"/>

  <!-- 高性能连接点 -->
  <circle cx="50" cy="55" r="2" fill="#8B5CF6"/>
  <circle cx="60" cy="70" r="2" fill="#8B5CF6"/>
  <circle cx="70" cy="55" r="2" fill="#8B5CF6"/>

  <!-- 配置中心名称简写 -->
  <text x="60" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" font-weight="bold">
    Nimbus-conf
  </text>
</svg>