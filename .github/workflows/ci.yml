name: Xuantong CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test-password
          MYSQL_DATABASE: xuantong_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptest-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: xuantong_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d xuantong_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run unit and real infrastructure integration tests
        env:
          XUANTONG_TEST_MYSQL_URL: jdbc:mysql://127.0.0.1:3306/xuantong_test?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
          XUANTONG_TEST_MYSQL_USER: root
          XUANTONG_TEST_MYSQL_PASSWORD: test-password
          XUANTONG_TEST_PGSQL_URL: jdbc:postgresql://127.0.0.1:5432/xuantong_test
          XUANTONG_TEST_PGSQL_USER: postgres
          XUANTONG_TEST_PGSQL_PASSWORD: test-password
        run: mvn --batch-mode --no-transfer-progress test -DskipTests=false
      - name: Check whitespace errors
        run: git diff --check
