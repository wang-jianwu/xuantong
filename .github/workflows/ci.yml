name: Xuantong CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test-password
          MYSQL_ROOT_HOST: "%"
          MYSQL_DATABASE: xuantong_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptest-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Install MySQL backup client
        run: |
          sudo apt-get update
          sudo apt-get install --yes mysql-client-8.0
          mysql --version
          mysqldump --version
      - name: Run unit and real infrastructure integration tests
        env:
          XUANTONG_TEST_MYSQL_URL: jdbc:mysql://127.0.0.1:3306/xuantong_test?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
          XUANTONG_TEST_MYSQL_SMOKE_URL: jdbc:mysql://127.0.0.1:3306/xuantong_test?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
          XUANTONG_TEST_MYSQL_USER: root
          XUANTONG_TEST_MYSQL_PASSWORD: test-password
        run: mvn --batch-mode --no-transfer-progress test -DskipTests=false
      - name: Verify real infrastructure tests were not skipped
        run: ./scripts/verify-ci-test-reports.sh
      - name: Run MySQL backup and restore drill
        env:
          XUANTONG_RECOVERY_MYSQL_HOST: 127.0.0.1
          XUANTONG_RECOVERY_MYSQL_PORT: "3306"
          XUANTONG_RECOVERY_MYSQL_USER: root
          XUANTONG_RECOVERY_MYSQL_PASSWORD: test-password
          MVN_BIN: mvn
        run: ./scripts/run-external-database-recovery-drill.sh
      - name: Run combined H2/MySQL and Raft quorum recovery drill
        env:
          XUANTONG_RECOVERY_MYSQL_HOST: 127.0.0.1
          XUANTONG_RECOVERY_MYSQL_PORT: "3306"
          XUANTONG_RECOVERY_MYSQL_USER: root
          XUANTONG_RECOVERY_MYSQL_PASSWORD: test-password
          MVN_BIN: mvn
        run: ./scripts/run-full-recovery-drill.sh
      - name: Check whitespace errors
        run: git diff --check

  control-plane-fault-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify report tooling
        run: jq --version
      - name: Run split-process follower and leader fault matrix
        env:
          MVN_BIN: mvn
          XUANTONG_LOAD_SPLIT_DURATION_SECONDS: "5"
          XUANTONG_LOAD_CLIENTS: "3"
          XUANTONG_LOAD_WATCHERS: "3"
          XUANTONG_LOAD_FETCH_CONCURRENCY: "3"
          XUANTONG_LOAD_FETCH_RATE_PER_SECOND: "30"
          XUANTONG_LOAD_PUBLISH_RATE_PER_MINUTE: "30"
          XUANTONG_LOAD_PAYLOAD_BYTES: "128"
          XUANTONG_LOAD_SAMPLE_INTERVAL_SECONDS: "1"
          XUANTONG_LOAD_GROWTH_WARMUP_SECONDS: "0"
          XUANTONG_LOAD_SPLIT_CHILD_MAX_HEAP_MB: "256"
          XUANTONG_LOAD_REPORT_DIR: output/load-reports/control-plane-matrix
          XUANTONG_LOAD_RUN_LABEL: github-${{ github.run_id }}-${{ github.run_attempt }}
          XUANTONG_LOAD_BUILD_REVISION: ${{ github.sha }}
          XUANTONG_LOAD_BUILD_STATE: clean
        run: ./scripts/run-control-plane-load.sh split-topology-matrix
      - name: Verify report validator fails closed
        run: |
          ./scripts/test-control-plane-load-report-verifier.sh \
            output/load-reports/control-plane-matrix/split-process-topology-follower.jsonl \
            follower
          ./scripts/test-control-plane-load-report-verifier.sh \
            output/load-reports/control-plane-matrix/split-process-topology-leader.jsonl \
            leader
      - name: Upload control-plane fault reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-fault-matrix-${{ github.run_id }}
          path: output/load-reports/control-plane-matrix/*.jsonl
          if-no-files-found: warn
          retention-days: 14

  release-supply-chain:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify release metadata and tracked credentials
        run: |
          ./scripts/verify-release-metadata.sh --allow-snapshot
          ./scripts/verify-no-secrets.sh
      - name: Generate aggregate CycloneDX SBOM
        run: >-
          mvn --batch-mode --no-transfer-progress -Psbom
          -DskipTests verify
          -Dxuantong.build.outputTimestamp="$(git show -s --format=%cI HEAD)"
      - name: Verify SBOM license policy
        run: ./scripts/verify-sbom-policy.sh target/xuantong-sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: xuantong-sbom-${{ github.sha }}
          path: target/xuantong-sbom.json
          if-no-files-found: error
          retention-days: 30

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Reject newly introduced vulnerable or incompatible dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: AGPL-1.0-only, AGPL-1.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later, SSPL-1.0
