name: Xuantong Release

on:
  push:
    tags:
      - "v2.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xuantong-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      publish: ${{ steps.release.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Validate version and immutable release ref
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's:.*<version>\([^<]*\)</version>.*:\1:p' pom.xml | head -n 1)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            [[ "$version" != *-SNAPSHOT ]] || {
              echo "A release tag cannot publish a SNAPSHOT version" >&2
              exit 1
            }
            [[ "${GITHUB_REF_NAME}" == "v$version" ]] || {
              echo "Tag ${GITHUB_REF_NAME} does not match POM version $version" >&2
              exit 1
            }
            publish=true
            ./scripts/verify-release-metadata.sh
          else
            publish=false
            ./scripts/verify-release-metadata.sh --allow-snapshot
          fi
          ./scripts/verify-no-secrets.sh
          git diff --exit-code
          git diff --cached --exit-code
          [[ -z "$(git ls-files --others --exclude-standard)" ]]
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

  build-and-drill:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test-password
          MYSQL_ROOT_HOST: "%"
          MYSQL_DATABASE: xuantong_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptest-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      XUANTONG_TEST_MYSQL_URL: jdbc:mysql://127.0.0.1:3306/xuantong_test?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      XUANTONG_TEST_MYSQL_SMOKE_URL: jdbc:mysql://127.0.0.1:3306/xuantong_test?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      XUANTONG_TEST_MYSQL_USER: root
      XUANTONG_TEST_MYSQL_PASSWORD: test-password
      XUANTONG_RECOVERY_MYSQL_HOST: 127.0.0.1
      XUANTONG_RECOVERY_MYSQL_PORT: "3306"
      XUANTONG_RECOVERY_MYSQL_USER: root
      XUANTONG_RECOVERY_MYSQL_PASSWORD: test-password
      MVN_BIN: mvn
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Install MySQL backup client
        run: |
          sudo apt-get update
          sudo apt-get install --yes mysql-client-8.0
      - name: Verify reproducible release artifacts
        run: ./scripts/verify-release-reproducibility.sh
      - name: Build release candidate with full test suite
        shell: bash
        run: |
          args=(--output output/release)
          if [[ "${{ needs.validate.outputs.publish }}" != "true" ]]; then
            args+=(--allow-snapshot)
          fi
          ./scripts/build-release-candidate.sh "${args[@]}"
      - name: Verify mandatory infrastructure tests ran
        run: ./scripts/verify-ci-test-reports.sh
      - name: Run MySQL backup and restore drill
        run: ./scripts/run-external-database-recovery-drill.sh
      - name: Run combined H2/MySQL and Raft quorum recovery drill
        run: ./scripts/run-full-recovery-drill.sh
      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: xuantong-${{ needs.validate.outputs.version }}
          path: output/release/
          if-no-files-found: error
          retention-days: 30

  vulnerability-scan:
    needs: [validate, build-and-drill]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xuantong-${{ needs.validate.outputs.version }}
          path: output/release
      - name: Locate SBOM
        id: sbom
        shell: bash
        run: |
          set -euo pipefail
          sbom="$(find output/release -maxdepth 1 -name '*.cdx.json' -type f -print -quit)"
          [[ -n "$sbom" ]]
          echo "path=$sbom" >> "$GITHUB_OUTPUT"
      - name: Scan release SBOM
        id: scan
        uses: anchore/scan-action@v6
        with:
          sbom: ${{ steps.sbom.outputs.path }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
      - name: Upload vulnerability report
        if: always() && steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

  publish:
    if: needs.validate.outputs.publish == 'true'
    needs: [validate, build-and-drill, vulnerability-scan]
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - uses: actions/download-artifact@v4
        with:
          name: xuantong-${{ needs.validate.outputs.version }}
          path: output/release
      - name: Verify promoted artifact checksums
        working-directory: output/release
        run: sha256sum --check SHA256SUMS
      - name: Sign and publish public SDK coordinates to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: >-
          mvn --batch-mode --no-transfer-progress
          -Prelease-artifacts,central-publish
          -pl :xuantong-protocol,:xuantong-client-core,:xuantong-solon-plugin,:xuantong-solon-cloud-plugin,:xuantong-spring-boot-starter,:xuantong-spring-cloud-starter
          -am deploy -DskipTests
          -Dxuantong.build.outputTimestamp="$(git show -s --format=%cI HEAD)"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.validate.outputs.version, '-RC') || contains(needs.validate.outputs.version, '-M') }}
          files: |
            output/release/xuantong-server-${{ needs.validate.outputs.version }}.jar
            output/release/xuantong-probe-${{ needs.validate.outputs.version }}.jar
            output/release/xuantong-${{ needs.validate.outputs.version }}.cdx.json
            output/release/release-manifest.json
            output/release/SHA256SUMS
            output/release/LICENSE
