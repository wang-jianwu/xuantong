services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: xuantong_config
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-center:
    build:
      context: .
      dockerfile: xuantong-admin/Dockerfile
    ports:
      - "8088:8088"
    environment:
      XUANTONG_DB_USER: root
      XUANTONG_DB_PASSWORD: ${DB_PASSWORD}
      XUANTONG_DB_URL: jdbc:mysql://mysql:3306/xuantong_config?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      XUANTONG_DB_DRIVER: com.mysql.cj.jdbc.Driver
      XUANTONG_DB_DIALECT: mysql
      BROKER_SECRET_KEY: ${BROKER_SECRET_KEY:?BROKER_SECRET_KEY must be set}
      CONFIG_ENCRYPT_KEY: ${CONFIG_ENCRYPT_KEY:?CONFIG_ENCRYPT_KEY must be set}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/xuantong-admin/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
