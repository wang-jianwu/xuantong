services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: xuantong_config
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  xuantong-server:
    build:
      context: .
      dockerfile: xuantong-server/Dockerfile
    ports:
      - "8088:8088"
      - "8090:8090"
      - "9101:9101"
    environment:
      XUANTONG_DB_USER: root
      XUANTONG_DB_PASSWORD: ${DB_PASSWORD}
      XUANTONG_DB_URL: jdbc:mysql://mysql:3306/xuantong_config?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      XUANTONG_DB_DRIVER: com.mysql.cj.jdbc.Driver
      XUANTONG_DB_DIALECT: mysql
      XUANTONG_ADMIN_SESSION_SECRET: ${XUANTONG_ADMIN_SESSION_SECRET:?XUANTONG_ADMIN_SESSION_SECRET must be set}
      XUANTONG_CLUSTER_ID: ${XUANTONG_CLUSTER_ID:-xuantong-local}
      XUANTONG_GATEWAY_ID: ${XUANTONG_GATEWAY_ID:-gateway-dev}
      # Docker Compose 是本地单节点开发拓扑，不具备生产容错能力。
      XUANTONG_CONFIG_STATE_ENABLED: "true"
      XUANTONG_REGISTRY_STATE_ENABLED: "true"
      XUANTONG_STATE_NODE_ID: state-dev
      XUANTONG_CONFIG_STATE_PEERS: state-dev@xuantong-server:9101
      XUANTONG_STATE_RPC_BIND_HOST: 0.0.0.0
      XUANTONG_STATE_RPC_BIND_PORT: 9101
      XUANTONG_CONFIG_STATE_ALLOW_SINGLE_NODE: "true"
      XUANTONG_STATE_DIR: /var/lib/xuantong/state
      XUANTONG_STATE_STORAGE_FREE_MIN_BYTES: ${XUANTONG_STATE_STORAGE_FREE_MIN_BYTES:-536870912}
    volumes:
      - state_data:/var/lib/xuantong/state
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  xuantong-probe:
    build:
      context: .
      dockerfile: xuantong-probe/Dockerfile
    ports:
      - "9118:9118"
    environment:
      XUANTONG_PROBE_SERVERS: xuantong-server:8090
      XUANTONG_PROBE_PROFILE: config
      XUANTONG_PROBE_NAMESPACE: public
      XUANTONG_PROBE_GROUP: DEFAULT_GROUP
      XUANTONG_PROBE_TOKEN: ${XUANTONG_ACCESS_TOKEN:-}
      XUANTONG_PROBE_PORT: 9118
    depends_on:
      xuantong-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9118/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  state_data:
