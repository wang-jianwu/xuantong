# Xuantong Admin 配置
server:
  port: 8088
  contextPath: /xuantong-admin
solon:
  app:
    name: xuantong-admin
    group: xuantong

  # 会话配置 — SameSite=Lax 防止 CSRF
  session:
    cookie:
      sameSite: Lax
      httpOnly: true

  serialization.json:
    dateAsFormat: 'yyyy-MM-dd HH:mm:ss'
    dateAsTimeZone: 'GMT+8'
    dateAsTicks: false
    longAsString: false
    boolAsInt: false
    nullStringAsEmpty: true
    nullBoolAsFalse: true
    nullNumberAsZero: true
    nullArrayAsEmpty: true
    nullAsWriteable: true
    enumAsName: true