# Xuantong Admin 配置
server:
  port: 8088
  contextPath: /xuantong-admin
solon:
  env: dev
  app:
    name: xuantong-admin
    group: xuantong

  serialization.json:
    dateAsFormat: 'yyyy-MM-dd HH:mm:ss'
    dateAsTimeZone: 'GMT+8'
    dateAsTicks: false
    longAsString: false
    boolAsInt: false
    nullStringAsEmpty: true
    nullBoolAsFalse: true
    nullNumberAsZero: true
    nullArrayAsEmpty: true
    nullAsWriteable: true
    enumAsName: true

# 模板引擎配置
solon.view.enjoy:
  devMode: false  # 生产环境设为false启用缓存
  cache: true     # 启用模板缓存
  cacheSize: 500  # 缓存模板数量