<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <defs>
    <linearGradient id="tech-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a75ff"/>
      <stop offset="100%" stop-color="#0a2543"/>
    </linearGradient>

    <!-- 电路板纹理图案 -->
    <pattern id="circuit-pattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,0 L20,20 M20,0 L0,20" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.3"/>
    </pattern>

    <!-- 阴阳点阵图案 -->
    <pattern id="yin-yang-dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff"/>
      <circle cx="8" cy="8" r="1" fill="#ffffff"/>
    </pattern>
  </defs>

  <!-- 背景底座 -->
  <rect x="0" y="0" width="200" height="100" fill="url(#tech-gradient)"/>

  <!-- 电路板纹理层 -->
  <rect x="0" y="0" width="200" height="100" fill="url(#circuit-pattern)"/>

  <!-- 阴阳点阵顶部装饰 -->
  <rect x="50" y="10" width="100" height="10" fill="url(#yin-yang-dots)" opacity="0.6"/>

  <!-- 玄字草书抽象形态 -->
  <path d="M60,40 C70,20 90,30 100,40 C110,50 130,45 140,60"
        fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

  <!-- 数据流动线条 -->
  <path d="M50,70 L150,70" stroke="#ffffff" stroke-width="1" stroke-dasharray="5,3"/>
  <path d="M60,65 L80,75 L100,65 L120,75 L140,65"
        fill="none" stroke="#10B981" stroke-width="2"/>

  <!-- 文字标识 -->
  <text x="100" y="85" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif"
        font-size="12" fill="#ffffff" font-weight="bold">
    玄同
  </text>
  <text x="100" y="95" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#ffffff" font-weight="normal" letter-spacing="1">
    Xuantong Config
  </text>
</svg>