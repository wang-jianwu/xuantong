# 数据源配置
solon:
  dataSources:
    nimbus:
      class: "com.zaxxer.hikari.HikariDataSource"
      jdbcUrl: jdbc:mysql://119.45.176.115:3306/nimbus_config?useCursorFetch=true&rewriteBatchedStatements=true&useSSL=false&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
      driverClassName: com.mysql.cj.jdbc.Driver
      username: root
      password: Mimi@1201
      maxPoolSize: 20
      minIdle: 5
      connectionTimeout: 30000
      idleTimeout: 600000
      maxLifetime: 1800000
      connectionTestQuery: SELECT 1
  #缓存
cache:
  base:
    driverType: "redis"
    defSeconds: 3600  # 延长缓存时间到1小时
    maxWaitMillis: 5000
    server: "119.45.176.115:6688"
    db: 0
    password: "Mimi@1201"
    maxTotal: 100
    maxIdle: 20
    minIdle: 5
    testOnBorrow: true
easy-query:
  # 配置自定义日志
  # log-class: ...
  nimbus:
    # 支持mysql pgsql h2 mssql dameng mssql_row_number kingbase_es等其余数据库在适配中
    database: mysql
    # 支持underlined default lower_camel_case upper_camel_case upper_underlined
    name-conversion: underlined
    # 物理删除时抛出异常 不包括手写sql的情况
    delete-throw: true
    insert-strategy: only_not_null_columns
    # 更新列策略 all_columns only_not_null_columns only_null_columns
    update-strategy: only_not_null_columns

# 记录器级别的配置示例
solon.logging.logger:
  "root": #默认记录器配置
    level: INFO
  "com.zaxxer.hikari":
    level: WARN
  "org.noear.solon":
    level: INFO
  "com.nimbus":
    level: DEBUG