security:
  clientAuthRequired: ${XUANTONG_CLIENT_AUTH_REQUIRED:false}
  production: ${XUANTONG_PRODUCTION:false}
  admin:
    # 多 Server 必须配置相同的 32+ 字节随机密钥；生产环境禁止留空。
    sessionSecret: ${XUANTONG_ADMIN_SESSION_SECRET:}
    sessionTtlSeconds: ${XUANTONG_ADMIN_SESSION_TTL_SECONDS:7200}
    cookieSecure: ${XUANTONG_ADMIN_COOKIE_SECURE:false}
    cookieSameSite: ${XUANTONG_ADMIN_COOKIE_SAME_SITE:Lax}
    login:
      maxFailures: ${XUANTONG_ADMIN_LOGIN_MAX_FAILURES:5}
      windowSeconds: ${XUANTONG_ADMIN_LOGIN_WINDOW_SECONDS:900}
      baseBackoffSeconds: ${XUANTONG_ADMIN_LOGIN_BASE_BACKOFF_SECONDS:1}
      maxBackoffSeconds: ${XUANTONG_ADMIN_LOGIN_MAX_BACKOFF_SECONDS:300}

discovery:
  # 实例超过该时间没有心跳即自动摘除
  instanceTimeoutMs: ${XUANTONG_INSTANCE_TIMEOUT_MS:30000}
  # 过期实例扫描周期
  cleanupIntervalMs: ${XUANTONG_INSTANCE_CLEANUP_MS:5000}

# ── 数据源 ──
# 默认 H2 内嵌数据库，零配置启动；生产环境通过 XUANTONG_DB_* 环境变量切换数据库。
xuantong:
  class: "com.zaxxer.hikari.HikariDataSource"
  # 2.0 使用独立数据文件，不读取或迁移 1.x 的 ./data/xuantong
  # DB_CLOSE_ON_EXIT=FALSE 避免 H2 的 JVM Shutdown Hook 抢先关闭数据库，应用由 Hikari 按生命周期关库。
  jdbcUrl: ${XUANTONG_DB_URL:jdbc:h2:file:./data/xuantong-2;MODE=MySQL;DATABASE_TO_UPPER=FALSE;DB_CLOSE_ON_EXIT=FALSE}
  driverClassName: ${XUANTONG_DB_DRIVER:org.h2.Driver}
  username: ${XUANTONG_DB_USER:sa}
  password: ${XUANTONG_DB_PASSWORD:}

easy-query:
  xuantong:
    # 数据库方言：h2（默认） / mysql / pgsql（也接受 postgres、postgresql）
    database: ${XUANTONG_DB_DIALECT:h2}
    name-conversion: underlined
    # 物理删除时抛出异常 不包括手写sql的情况
    delete-throw: true
    insert-strategy: only_not_null_columns
    # 更新列策略 all_columns only_not_null_columns only_null_columns
    update-strategy: only_not_null_columns

# 记录器级别的配置示例
solon.logging.logger:
  "root": #默认记录器配置
    level: INFO
  "com.zaxxer.hikari":
    level: WARN
  "com.easy.query":
    level: WARN
  "org.noear.solon":
    level: INFO
  "com.xuantong":
    level: INFO
